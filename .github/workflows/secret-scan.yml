name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Summary
        if: always()
        run: |
          echo "### 🔍 Secret Scan 完成" >> $GITHUB_STEP_SUMMARY
          echo "- 已扫描所有变更文件" >> $GITHUB_STEP_SUMMARY
          echo "- 仅报告已验证的 secret" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "**注意**: 如果发现 secret，请立即：" >> $GITHUB_STEP_SUMMARY
          echo "1. 撤销泄露的密钥" >> $GITHUB_STEP_SUMMARY
          echo "2. 从 Git 历史中彻底删除" >> $GITHUB_STEP_SUMMARY
          echo "3. 重新生成新密钥" >> $GITHUB_STEP_SUMMARY
