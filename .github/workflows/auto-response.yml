name: Auto PR Response

on:
  pull_request:
    types: [opened]

jobs:
  response:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Auto comment
        uses: thijsvanloef/pr-comment-action@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          message: |
            👋 你好！感谢你的 PR。

            **CI 检查正在运行**，请等待所有检查完成后再合并。

            🔍 **已触发的自动检查**：
            - ✅ CI (测试 + 构建验证)
            - ✅ Code Review (代码质量)
            - ✅ Adversarial QA Review (对抗性审查)
            - ✅ CodeQL (安全扫描)

            如有问题会自动显示在这里。
