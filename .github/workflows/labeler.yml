# PR Labeler 配置
# 根据修改文件自动打标签

version: 2
labels:
  - label: "feature"
    matcher:
      files:
        - "src/**/*"
        - "scripts/**/*"
  - label: "ci"
    matcher:
      files:
        - ".github/workflows/**/*"
  - label: "documentation"
    matcher:
      files:
        - "**/*.md"
        - "docs/**/*"
  - label: "testing"
    matcher:
      files:
        - "**/*.test.ts"
        - "**/*.test.js"
        - "**/*.spec.ts"
        - "**/*.spec.js"
  - label: "dependencies"
    matcher:
      files:
        - "package.json"
        - "package-lock.json"
  - label: "config"
    matcher:
      files:
        - "config/**/*"
  - label: "openspec"
    matcher:
      files:
        - "openspec/**/*"
