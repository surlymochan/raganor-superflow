name: Gitleaks Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_amd64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz

      - name: Run gitleaks
        run: |
          gitleaks detect --source . --redact --exit-code 2

      - name: Summary
        if: always()
        run: |
          echo "### 🔍 Gitleaks Secret Scan 完成" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "**如果发现 secret**:" >> $GITHUB_STEP_SUMMARY
          echo "1. 🚨 立即撤销泄露的密钥" >> $GITHUB_STEP_SUMMARY
          echo "2. 从 Git 历史中彻底删除" >> $GITHUB_STEP_SUMMARY
          echo "3. 重新生成新密钥" >> $GITHUB_STEP_SUMMARY
