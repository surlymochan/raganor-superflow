name: Superflow 工作流问题
description: 报告 Superflow 四阶段工作流相关的问题
labels: ['workflow', 'bug']
body:
  - type: markdown
    attributes:
      value: |
        请描述你在使用 Superflow 四阶段工作流时遇到的问题。
  - type: dropdown
    id: stage
    attributes:
      label: 影响的阶段
      description: 问题出现在哪个阶段？
      options:
        - 阶段 1: 脑暴 (Brainstorming)
        - 阶段 2: 计划 (Planning)
        - 阶段 3: 执行 (Execute)
        - 阶段 4: 归档 (Archive)
        - 不确定 / 多个阶段
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请详细描述你遇到的问题
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: 执行的命令
      description: 请复制并粘贴你执行的命令
      render: shell
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true
