name: Bug Report
description: 报告一个错误
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 Issue！请尽可能详细地描述问题。
  - type: input
    id: contact
    attributes:
      label: 联系方式
      description: 如何联系你？（可选）
      placeholder: email@example.com
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 简要描述你遇到的问题
      placeholder: 告诉我发生了什么
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题
      placeholder: |
        1. 执行步骤 1
        2. 执行步骤 2
        3. 出现问题
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: 平台
      description: 你使用的是哪个平台？
      placeholder: Claude Code / OpenCode / Cursor
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本
      description: Superflow 版本
      placeholder: 1.0.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请复制并粘贴任何相关的日志输出
      render: shell
