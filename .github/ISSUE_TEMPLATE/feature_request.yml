name: Feature Request
description: 提议一个新功能
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        感谢提交功能建议！请尽可能详细地描述你的需求。
  - type: textarea
    id: problem
    attributes:
      label: 问题陈述
      description: 你的功能请求是否与某个问题相关？
      placeholder: 我常常感到困扰的是...
    validations:
      required: false
  - type: textarea
    id: proposal
    attributes:
      label: 提议的解决方案
      description: 描述你想要的功能
      placeholder: 我希望可以...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 描述你考虑过的替代方案
      placeholder: 我也想过...
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      description: 这个功能适用于哪个平台？
      options:
        - 全部平台
        - Claude Code
        - OpenCode
        - Cursor
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 附加上下文
      description: 添加关于功能请求的任何其他上下文
    validations:
      required: false
