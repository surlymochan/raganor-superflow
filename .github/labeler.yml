# PR Labeler 配置
# 根据修改文件自动打标签

feature:
- changed-files:
  - any-glob-to-any-file:
    - src/**/*
    - scripts/**/*

ci:
- changed-files:
  - any-glob-to-any-file:
    - .github/workflows/**/*

documentation:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.md'
    - docs/**/*

testing:
- changed-files:
  - any-glob-to-any-file:
    - '**/*.test.ts'
    - '**/*.test.js'
    - '**/*.spec.ts'
    - '**/*.spec.js'

dependencies:
- changed-files:
  - any-glob-to-any-file:
    - package.json
    - package-lock.json

config:
- changed-files:
  - any-glob-to-any-file:
    - config/**/*

openspec:
- changed-files:
  - any-glob-to-any-file:
    - openspec/**/*
